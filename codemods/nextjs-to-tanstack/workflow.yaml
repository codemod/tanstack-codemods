# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json
#
# Globs MUST work when `-t <repo-or-package-root>` points anywhere sensible: use
# `**/app/**` / `**/pages/**` (not bare `app/**`) so nested trees like `apps/foo/app/...`
# or `apps/foo/pages/...` match.
# In huge monorepos, pass `-t` to the Next.js package you are migrating to limit scope.
#
version: "1"

params:
  schema:
    enableAiFollowupFixups:
      name: "Enable AI Follow-up Fixups"
      description: "Run AI step for remaining TODOs and TANSTACK_MIGRATION_NEXT_STEPS tasks."
      type: string
      default: "false"

x-shared-excludes: &shared-excludes
  - "**/node_modules/**"
  - "**/.next/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/coverage/**"
  - "**/.git/**"
  - "**/.*/**"
  # Backup tree emitted late in the workflow — exclude everywhere so earlier passes never scan/write here (also avoids failures when leftover dirs have awkward ownership/perms).
  - "**/migrated-from-pages/**"
  - "**/*.d.ts"

# Cross-cutting transforms: any `.ts`/`.tsx`/`.js`/`.jsx` under the workflow target (`-t`).
# Use `-t <package-root>` in monorepos to avoid scanning the whole repo.
x-cross-cutting-ts: &cross-cutting-ts
  - "**/*.tsx"
  - "**/*.jsx"
  - "**/*.ts"
  - "**/*.js"

x-cross-cutting-tsx: &cross-cutting-tsx
  - "**/*.tsx"
  - "**/*.jsx"

x-cross-cutting-server-fn: &cross-cutting-server-fn
  - "**/*.ts"
  - "**/*.tsx"

nodes:
  - id: cleanup-obsolete-files
    name: Delete Next.js config files
    type: automatic
    depends_on: [scaffold-tanstack-files]
    steps:
      - name: Remove next.config.* and postcss.config.*
        js-ast-grep:
          js_file: scripts/entries/cleanup-obsolete-files.ts
          language: tsx
          include:
            - "**/next.config.js"
            - "**/next.config.mjs"
            - "**/next.config.cjs"
            - "**/next.config.ts"
            - "**/next.config.mts"
            - "**/next.config.cts"
            - "**/postcss.config.js"
            - "**/postcss.config.mjs"
            - "**/postcss.config.cjs"
          exclude: *shared-excludes

  - id: scaffold-tanstack-files
    name: Create vite.config.ts and router.tsx (TanStack Start scaffold)
    type: automatic
    steps:
      # When `next-i18next.config.*` / Next `i18n` is present, also writes `.codemod/i18n.json`
      # and later steps emit `src/app/{-$locale}/…` + `createFileRoute("/{-$locale}/…")` per TanStack i18n docs.
      - name: Write new config files (idempotent, skip if exist)
        js-ast-grep:
          js_file: scripts/entries/scaffold-tanstack-files.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  # ---- Structural rewrites (file-shape-changing, ordered) ----

  - id: rewrite-root-layout
    name: R1 — Convert layout.tsx / _app.tsx to __root.tsx
    type: automatic
    depends_on: [cleanup-obsolete-files]
    steps:
      - name: Structural rewrite + rename
        js-ast-grep:
          js_file: scripts/entries/rewrite-root-layout.ts
          language: tsx
          include:
            - "**/src/app/layout.tsx"
            - "**/src/app/layout.jsx"
            - "**/app/layout.tsx"
            - "**/app/layout.jsx"
            - "**/src/pages/_app.tsx"
            - "**/src/pages/_app.jsx"
            - "**/pages/_app.tsx"
            - "**/pages/_app.jsx"
          exclude: *shared-excludes

  - id: rewrite-api-routes
    name: R6 — App route.ts + api/**/*.ts + Pages api/ → createFileRoute handlers
    type: automatic
    depends_on: [rewrite-root-layout]
    steps:
      - name: Hoist HTTP handlers + rename
        js-ast-grep:
          js_file: scripts/entries/rewrite-api-routes.ts
          language: tsx
          include:
            - "**/src/app/**/route.ts"
            - "**/src/app/**/route.js"
            - "**/app/**/route.ts"
            - "**/app/**/route.js"
            - "**/src/app/api/**/*.ts"
            - "**/src/app/api/**/*.js"
            - "**/app/api/**/*.ts"
            - "**/app/api/**/*.js"
            - "**/src/pages/api/**/*.ts"
            - "**/src/pages/api/**/*.js"
            - "**/pages/api/**/*.ts"
            - "**/pages/api/**/*.js"
          exclude: *shared-excludes

  - id: rewrite-pages
    name: R2 — Wrap page components in createFileRoute + rename (app + pages router)
    type: automatic
    depends_on: [rewrite-api-routes]
    steps:
      - name: Structural rewrite + rename
        js-ast-grep:
          js_file: scripts/entries/rewrite-pages.ts
          language: tsx
          include:
            - "**/src/app/**/page.tsx"
            - "**/src/app/**/page.jsx"
            - "**/app/**/page.tsx"
            - "**/app/**/page.jsx"
            - "**/src/pages/**/*.tsx"
            - "**/src/pages/**/*.jsx"
            - "**/pages/**/*.tsx"
            - "**/pages/**/*.jsx"
          exclude: *shared-excludes

  - id: repair-route-file-tails-post-pages
    name: R2a — Truncate orphan text after first Route (after R2 wrap)
    type: automatic
    depends_on: [rewrite-pages]
    steps:
      - name: Drop duplicate Route blocks / partial SSG tails early
        js-ast-grep:
          js_file: scripts/entries/repair-route-file-tails.ts
          language: tsx
          include:
            - "**/src/app/**/*.ts"
            - "**/src/app/**/*.tsx"
            - "**/src/app/**/*.js"
            - "**/src/app/**/*.jsx"
            - "**/app/**/*.ts"
            - "**/app/**/*.tsx"
            - "**/app/**/*.js"
            - "**/app/**/*.jsx"
          exclude: *shared-excludes

  - id: rewrite-special-next-files
    name: R2b — loading / error / not-found / template.tsx (next2tanstack parity)
    type: automatic
    depends_on: [repair-route-file-tails-post-pages]
    steps:
      - name: Map Next special routes to TanStack route modules (template.tsx best-effort)
        js-ast-grep:
          js_file: scripts/entries/rewrite-special-next-files.ts
          language: tsx
          include:
            - "**/src/app/loading.tsx"
            - "**/src/app/error.tsx"
            - "**/src/app/not-found.tsx"
            - "**/src/app/template.tsx"
            - "**/src/app/**/loading.tsx"
            - "**/src/app/**/error.tsx"
            - "**/src/app/**/not-found.tsx"
            - "**/src/app/**/template.tsx"
            - "**/app/loading.tsx"
            - "**/app/error.tsx"
            - "**/app/not-found.tsx"
            - "**/app/template.tsx"
            - "**/app/**/loading.tsx"
            - "**/app/**/error.tsx"
            - "**/app/**/not-found.tsx"
            - "**/app/**/template.tsx"
          exclude: *shared-excludes

  - id: prune-empty-next-route-dirs
    name: R2c — Remove empty Next.js `[segment]` / `[...]` dirs under app/
    type: automatic
    depends_on: [rewrite-special-next-files]
    steps:
      - name: Delete abandoned dynamic segment folders after page moves
        js-ast-grep:
          js_file: scripts/entries/prune-empty-next-route-dirs.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  # ---- Post-structure rewrites (operate on already-renamed files) ----

  - id: rewrite-dynamic-params
    name: R3 — Rewrite params / searchParams to Route hooks
    type: automatic
    depends_on: [prune-empty-next-route-dirs]
    steps:
      - name: Replace await params with Route.useParams / Route.useSearch
        js-ast-grep:
          js_file: scripts/entries/rewrite-dynamic-params.ts
          language: tsx
          include:
            - "**/src/app/**/*.tsx"
            - "**/src/app/**/*.jsx"
            - "**/app/**/*.tsx"
            - "**/app/**/*.jsx"
          exclude: *shared-excludes

  - id: rewrite-metadata
    name: R7 — Convert `metadata` / `viewport` exports to head() config
    type: automatic
    depends_on: [rewrite-dynamic-params]
    steps:
      - name: Map metadata + viewport fields to head() meta / links
        js-ast-grep:
          js_file: scripts/entries/rewrite-metadata.ts
          language: tsx
          include:
            - "**/src/app/__root.tsx"
            - "**/src/app/**/*.tsx"
            - "**/app/__root.tsx"
            - "**/app/**/*.tsx"
          exclude: *shared-excludes

  # ---- Cross-cutting rewrites (deep src/ + app dirs, any depth under target) ----

  - id: rewrite-fonts
    name: R9 — Strip next/font and record font names for later steps
    type: automatic
    depends_on: [rewrite-metadata]
    steps:
      - name: Remove imports + className refs + write .codemod/state.json
        js-ast-grep:
          js_file: scripts/entries/rewrite-fonts.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-server-fns
    name: R8 — Wrap "use server" exports in createServerFn
    type: automatic
    depends_on: [rewrite-fonts]
    steps:
      - name: Replace "use server" directive
        js-ast-grep:
          js_file: scripts/entries/rewrite-server-fns.ts
          language: tsx
          semantic_analysis: workspace
          include: *cross-cutting-server-fn
          exclude: *shared-excludes

  - id: rewrite-link-image
    name: R4 + R5 — Swap next/link and next/image to TanStack / unpic
    type: automatic
    depends_on: [rewrite-server-fns]
    steps:
      - name: Replace imports + JSX attributes
        js-ast-grep:
          js_file: scripts/entries/rewrite-link-image.ts
          language: tsx
          semantic_analysis: workspace
          include: *cross-cutting-tsx
          exclude: *shared-excludes

  - id: rewrite-next-navigation
    name: R4b — next/navigation → TanStack Router (hooks, redirect, useRouter → useNavigate)
    type: automatic
    depends_on: [rewrite-link-image]
    steps:
      - name: next/navigation + next/router, usePathname/useSearch/useRouter/useParams, redirect, notFound, refresh→invalidate
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-navigation.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-dynamic-script
    name: R4c — next/dynamic + next/script (safe subset)
    type: automatic
    depends_on: [rewrite-next-navigation]
    steps:
      - name: dynamic → React.lazy; Script → native script when patterns are safe
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-dynamic-script.ts
          language: tsx
          include: *cross-cutting-tsx
          exclude: *shared-excludes

  - id: rewrite-next-internal-modules
    name: R4dist — next/dist + codegen strings (ApiError, path-to-regexp, dynamic import templates)
    type: automatic
    depends_on: [rewrite-next-dynamic-script]
    steps:
      - name: Replace internal Next paths and pinned dynamic import strings
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-internal-modules.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-i18next-imports
    name: R4d — next-i18next → react-i18next (cross-cutting)
    type: automatic
    depends_on: [rewrite-next-internal-modules]
    steps:
      - name: Shared components + all TS/JS — align with bootstrap I18next instance
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-i18next-imports.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-cache
    name: R4e — next/cache → TanStack Query (conventional query keys + unwrap unstable_cache/cache)
    type: automatic
    depends_on: [rewrite-next-i18next-imports]
    steps:
      - name: revalidateTag · revalidatePath → queryClient.invalidateQueries (['next-cache', …]); unwrap unstable_cache/cache; strip unstable_noStore
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-cache.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-headers
    name: R4f — next/headers → @tanstack/start/server getCookie / setCookie / deleteCookie / getCookies / getHeaders
    type: automatic
    depends_on: [rewrite-next-cache]
    steps:
      - name: cookies()/headers() → getCookie / setCookie / deleteCookie / getCookies / getHeaders[…]
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-headers.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-server
    name: R4h — next/server NextRequest/NextResponse → Request/Response (Fetch)
    type: automatic
    depends_on: [rewrite-next-headers]
    steps:
      - name: next/server → Fetch + edge UA + next/og ImageResponse + after/connection shims + type stubs (skip NextResponse.next / namespace / aliases)
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-server.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-server-vitest
    name: R4h-bis — Vitest — local NextRequest/NextResponse shims; strip vi.mock(next/server)
    type: automatic
    depends_on: [rewrite-next-server]
    steps:
      - name: Tests still using NextResponse.next/rewrite or vi.mock(next/server)
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-server-vitest.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: rewrite-next-og
    name: R4i — next/og → satori + @resvg/resvg-js + Response
    type: automatic
    depends_on: [rewrite-next-server-vitest]
    steps:
      - name: Replace ImageResponse with satori + Resvg PNG pipeline (Start/Vite)
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-og.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: migrate-next-metadata-images
    name: R4i-bis — opengraph-image / twitter-image → TanStack server GET routes
    type: automatic
    depends_on: [rewrite-next-og]
    steps:
      - name: Move metadata image modules to $segments + createFileRoute GET handlers
        js-ast-grep:
          js_file: scripts/entries/migrate-next-metadata-images.ts
          language: tsx
          include:
            - "**/src/app/**/opengraph-image.tsx"
            - "**/src/app/**/opengraph-image.ts"
            - "**/src/app/**/twitter-image.tsx"
            - "**/src/app/**/twitter-image.ts"
            - "**/app/**/opengraph-image.tsx"
            - "**/app/**/opengraph-image.ts"
            - "**/app/**/twitter-image.tsx"
            - "**/app/**/twitter-image.ts"
          exclude: *shared-excludes

  - id: annotate-async-pages
    name: R10 — Move safe top-level await into Route.loader + useLoaderData (TODO otherwise)
    type: automatic
    depends_on: [migrate-next-metadata-images]
    steps:
      - name: Extract sequential top-level await into createFileRoute.loader (or TODO when unsafe)
        js-ast-grep:
          js_file: scripts/entries/annotate-async-pages.ts
          language: tsx
          semantic_analysis: workspace
          include: *cross-cutting-tsx
          exclude: *shared-excludes

  - id: rewrite-next-pages-data
    name: R10a — Strip getStaticProps / next-i18next SSG / next/head from app routes
    type: automatic
    depends_on: [annotate-async-pages]
    steps:
      - name: Remove Pages data-fetching exports and migrate remaining imports
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-pages-data.ts
          language: tsx
          include:
            - "**/src/app/**/*.tsx"
            - "**/src/app/**/*.jsx"
            - "**/app/**/*.tsx"
            - "**/app/**/*.jsx"
          exclude: *shared-excludes

  - id: repair-route-file-tails
    name: R10a-bis — Truncate orphan text after first export const Route (app *.ts/*.tsx)
    type: automatic
    depends_on: [rewrite-next-pages-data]
    steps:
      - name: Keep only the first createFileRoute(...)() block (fixes invalid tails on API routes and pages)
        js-ast-grep:
          js_file: scripts/entries/repair-route-file-tails.ts
          language: tsx
          include:
            - "**/src/app/**/*.ts"
            - "**/src/app/**/*.tsx"
            - "**/src/app/**/*.js"
            - "**/src/app/**/*.jsx"
            - "**/app/**/*.ts"
            - "**/app/**/*.tsx"
            - "**/app/**/*.js"
            - "**/app/**/*.jsx"
          exclude: *shared-excludes

  - id: rewrite-next-types
    name: R10a-quater — Erase next/types and import type … from "next"
    type: automatic
    depends_on: [repair-route-file-tails]
    steps:
      - name: Replace Next type-only surface with any; remove imports
        js-ast-grep:
          js_file: scripts/entries/rewrite-next-types.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: strip-unused-next-imports
    name: R10a-ter — Remove wholly-unused next/* imports
    type: automatic
    depends_on: [rewrite-next-types]
    steps:
      - name: Delete import statements when no binding is referenced
        js-ast-grep:
          js_file: scripts/entries/strip-unused-next-imports.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  - id: annotate-remaining-next-imports
    name: R10b — TODO for surviving next/* imports and middleware.ts
    type: automatic
    depends_on: [strip-unused-next-imports]
    steps:
      - name: Line-level // TODO before each remaining Next import
        js-ast-grep:
          js_file: scripts/entries/annotate-remaining-next-imports.ts
          language: tsx
          include: *cross-cutting-ts
          exclude: *shared-excludes

  # ---- Static assets + companion patches ----

  - id: patch-globals-css
    name: R12 — Inject @fontsource and @theme blocks
    type: automatic
    depends_on: [annotate-remaining-next-imports]
    steps:
      - name: Add font imports to globals.css
        js-ast-grep:
          js_file: scripts/entries/patch-globals-css.ts
          language: css
          include:
            - "**/src/app/globals.css"
            - "**/app/globals.css"
            - "**/src/styles/globals.css"
            - "**/styles/globals.css"
          exclude: *shared-excludes

  - id: patch-package-json
    name: R11 — Update dependencies and scripts
    type: automatic
    depends_on: [patch-globals-css]
    steps:
      - name: Add TanStack deps, remove Next, add @fontsource-variable/*
        js-ast-grep:
          js_file: scripts/entries/patch-package-json.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: patch-cjs-root-configs-for-esm
    name: R11b — next-i18next.config.js CommonJS → ESM when type module
    type: automatic
    depends_on: [patch-package-json]
    steps:
      - name: Rewrite single module.exports in next-i18next.config.js to export default
        js-ast-grep:
          js_file: scripts/entries/patch-cjs-root-configs-for-esm.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: patch-tooling-and-docs
    name: R13 — tsconfig / ESLint JSON / README & workflows (no adjacent Next peers)
    type: automatic
    depends_on: [patch-cjs-root-configs-for-esm]
    steps:
      - name: Strip Next tsconfig plugin, patch extends; replace next CLI refs in docs/CI
        js-ast-grep:
          js_file: scripts/entries/patch-tooling-and-docs.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: cleanup-legacy-pages
    name: R14 — Relocate or remove leftover pages/ directories
    type: automatic
    depends_on: [patch-tooling-and-docs]
    steps:
      - name: Move unmigrated pages files to migrated-from-pages/ then delete pages/
        js-ast-grep:
          js_file: scripts/entries/cleanup-legacy-pages-dir.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: ensure-app-root
    name: R14b — Ensure __root.tsx exists for TanStack route generation
    type: automatic
    depends_on: [cleanup-legacy-pages]
    steps:
      - name: Write minimal src/app/__root.tsx (or app/__root.tsx) when missing
        js-ast-grep:
          js_file: scripts/entries/ensure-app-root.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: patch-root-i18n-provider
    name: R14c — I18nextProvider + src/i18n.ts when .codemod/i18n.json exists
    type: automatic
    depends_on: [ensure-app-root]
    steps:
      - name: Bootstrap i18next, patch __root, preload i18n from router
        js-ast-grep:
          js_file: scripts/entries/patch-root-i18n-provider.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: write-migration-guide
    name: Manual migration checklist (next steps for humans)
    type: automatic
    depends_on: [patch-root-i18n-provider]
    steps:
      - name: Write TANSTACK_MIGRATION_NEXT_STEPS.md beside migrated package.json
        js-ast-grep:
          js_file: scripts/entries/write-migration-guide.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes

  - id: ai-followup-fixups
    name: AI follow-up for remaining TODOs and migration guide tasks
    type: automatic
    depends_on: [write-migration-guide]
    steps:
      - name: Apply safe fixes from TODOs and TANSTACK_MIGRATION_NEXT_STEPS.md
        if: params.enableAiFollowupFixups == "true"
        ai:
          model: "gpt-4o"
          max_steps: 60
          prompt: |
            You are finishing a Next.js -> TanStack Start migration.

            Context:
            - Deterministic automated migrations have already run.
            - A migration guide file named TANSTACK_MIGRATION_NEXT_STEPS.md has been generated.
            - There may be inline TODO comments in code from earlier passes.

            Your tasks:
            1) Scan the migrated project for remaining migration TODO comments.
            2) Read TANSTACK_MIGRATION_NEXT_STEPS.md and implement as many listed tasks as possible.
            3) Prioritize low-risk, mechanical, and behavior-preserving fixes.
            4) Keep unresolved high-risk or ambiguous items as concise TODO comments.

            Constraints:
            - Keep edits minimal and deterministic.
            - Do not invent APIs or remove behavior without a clear replacement.
            - Preserve existing exports and type intent.
            - If a task cannot be safely automated, leave a clear TODO at the closest code location.

  # ---- Finalisation ----

  - id: finalize-cleanup
    name: Remove codemod sidecar state
    type: automatic
    depends_on: [ai-followup-fixups]
    steps:
      - name: Drop .codemod/state.json
        js-ast-grep:
          js_file: scripts/entries/finalize-cleanup.ts
          language: json
          include:
            - "**/package.json"
          exclude: *shared-excludes
